name: Terraform Validate and Format

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate-aws:
    name: AWS — Validate and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init (AWS)
        run: terraform -chdir=terraform/aws init -backend=false

      - name: Terraform Validate (AWS)
        run: terraform -chdir=terraform/aws validate

      - name: Terraform Format Check (AWS)
        run: terraform -chdir=terraform/aws fmt -check

  validate-gcp:
    name: GCP — Validate and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Init (GCP)
        run: terraform -chdir=terraform/gcp init -backend=false

      - name: Terraform Validate (GCP)
        run: terraform -chdir=terraform/gcp validate

      - name: Terraform Format Check (GCP)
        run: terraform -chdir=terraform/gcp fmt -check
