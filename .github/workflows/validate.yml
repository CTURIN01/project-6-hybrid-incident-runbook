name: Terraform Validate and Plan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate-aws:
    name: AWS Validate and Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
      - name: Init
        run: terraform -chdir=terraform/aws init -backend=false
      - name: Validate
        run: terraform -chdir=terraform/aws validate
      - name: Format check
        run: terraform -chdir=terraform/aws fmt -check
      - name: Plan
        run: terraform -chdir=terraform/aws plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        continue-on-error: true

  validate-gcp:
    name: GCP Validate and Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
      - name: Init
        run: terraform -chdir=terraform/gcp init -backend=false
      - name: Validate
        run: terraform -chdir=terraform/gcp validate
      - name: Format check
        run: terraform -chdir=terraform/gcp fmt -check
      - name: Plan
        run: terraform -chdir=terraform/gcp plan -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}"
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
        continue-on-error: true
